<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Vital for mobile sizing -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hybrid Workout</title>
  
  <!-- Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    <header>
      <button class="back-btn" id="back-btn">←</button>
      <h1 id="header-title">Hybrid Workout</h1>
    </header>

    <!-- Screen 1: Home (Select Day) -->
    <main id="home-screen" class="screen active">
      <div class="days-grid" id="days-container">
        <!-- Rendered via JS -->
      </div>
    </main>

    <!-- Screen 2: Workout -->
    <main id="workout-screen" class="screen">
      <div class="mode-selector">
        <p>Select Intensity:</p>
        <div class="mode-buttons">
          <button class="mode-btn active" data-mode="full">Full Mode</button>
          <button class="mode-btn" data-mode="lazy">Lazy Mode</button>
          <button class="mode-btn" data-mode="veryLazy">Very Lazy</button>
        </div>
      </div>

      <div class="exercise-list" id="exercise-container">
        <!-- Rendered via JS -->
      </div>

      <button class="reset-btn" id="reset-btn">Reset Today's Progress</button>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
